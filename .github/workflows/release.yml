name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# electron-builder creates the draft GitHub release on tag builds
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:renderer

      # On a tag push this uploads the installers to a draft GitHub release;
      # on manual runs it only builds.
      - name: Build installers
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legilo-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.appx
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
