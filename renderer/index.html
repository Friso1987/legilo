<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- unsafe-eval/wasm-unsafe-eval + worker blob: are required by the D2
       diagram engine (WASM + eval'd ELK layout lib in a worker); frame-src for
       YouTube/Vimeo embeds; data: fonts appear inside rendered diagram SVGs. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; worker-src blob:; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: http: https:; font-src 'self' data:; media-src 'self' file:; frame-src https://www.youtube-nocookie.com https://player.vimeo.com;" />
  <title>Legilo</title>
  <link rel="stylesheet" href="katex/katex.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-light mode-split">
  <div id="toolbar">
    <div class="toolbar-left" id="tabbar">
      <div id="tabs"></div>
      <button id="tab-add" title="New tab (Ctrl+N)">+</button>
    </div>
    <div class="toolbar-right">
      <button id="btn-insert" title="Insert markdown: headings, images, tables, code…">Insert ▾</button>
      <button id="btn-page" title="Cycle preview layout: flow / page / slides (Ctrl+Shift+P)">
        <span class="page-label">Flow</span>
      </button>
      <button id="btn-present" title="Presenter mode (F5) — slides split on ---">Present</button>
      <button id="btn-view" title="Cycle view: split / editor / preview (Ctrl+1/2/3)">
        <span class="view-label">Split</span>
      </button>
      <button id="btn-theme" title="Toggle dark theme (Ctrl+Shift+D)">
        <span class="theme-label">Dark</span>
      </button>
      <button id="btn-help" title="Markdown Guide — syntax examples and shortcuts">?</button>
    </div>
  </div>

  <div id="workspace">
    <div id="editor-pane"></div>
    <div id="divider" title="Drag to resize"></div>
    <div id="preview-pane">
      <article id="preview" class="markdown-body"></article>
    </div>
  </div>

  <div id="presenter" hidden>
    <div id="slide-stage">
      <article id="slide" class="markdown-body"></article>
    </div>
    <canvas id="ink-canvas"></canvas>
    <div id="slide-warn" hidden></div>
    <div id="presenter-hud">
      <button id="ink-pen" title="Draw on the slide (P) — a digital pen draws without toggling">✎</button>
      <button id="ink-color" title="Pen colour (C)">●</button>
      <button id="ink-erase" title="Eraser (E) — or use the pen's eraser end">⌫</button>
      <button id="ink-clear" title="Clear ink on this slide (X)">✧</button>
      <span class="hud-sep"></span>
      <button id="slide-prev" title="Previous (←)">‹</button>
      <span id="slide-counter">1 / 1</span>
      <button id="slide-next" title="Next (→)">›</button>
      <button id="presenter-exit" title="Exit (Esc)">✕</button>
    </div>
  </div>

  <article id="print-root" class="markdown-body"></article>

  <script src="bundle.js"></script>
</body>
</html>
